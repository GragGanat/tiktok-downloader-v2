<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader | No Watermark | HD Quality</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom gradient text for the title */
        .text-gradient {
            background: linear-gradient(to right, #00f2fe, #fe0979 );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Glassmorphism effect for the result card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Quality badge styling */
        .quality-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 0.875rem;
        }
        .quality-hd {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .quality-sd {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .quality-high {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        /* Toast Notification Styles */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
        }
        
        .toast.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .toast.info {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        
        .toast.hide {
            animation: slideOut 0.3s ease-out forwards;
        }
        
        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out;
        }

        /* Mobile responsive toast */
        @media (max-width: 640px) {
            .toast {
                bottom: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 0.75rem;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Container -->
    <div class="w-full max-w-2xl text-center space-y-8">
        
        <!-- Header -->
        <div class="space-y-2">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">
                TikTok <span class="text-gradient">Downloader</span>
            </h1>
            <p class="text-gray-400 text-lg">Download videos in HD quality (720p - 1080p) without watermark for free.</p>
        </div>

        <!-- Input Area -->
        <div class="w-full space-y-3">
            <!-- Paste Button (Above Search) -->
            <button id="pasteBtn" onclick="pasteFromClipboard()" 
                class="w-full bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-400 hover:to-cyan-500 text-white font-semibold px-4 py-2.5 rounded-lg transition-all text-sm flex items-center justify-center gap-2 shadow-lg">
                <i class="fa-solid fa-paste"></i> Paste from Clipboard
            </button>

            <!-- Search Input with Link Icon and X Button -->
            <div class="relative flex items-center w-full">
                <i class="fa-solid fa-link absolute left-4 text-gray-400"></i>
                <input type="text" id="urlInput" placeholder="Paste TikTok link here..." 
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg py-3 pl-12 pr-12 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all shadow-lg">
                
                <!-- X Button (Clear) - At the end of search bar -->
                <button id="clearBtn" onclick="clearInput()" 
                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition-colors hidden">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Get Video Button (Below Search Bar) -->
            <button id="fetchBtn" onclick="fetchVideo()" 
                class="w-full bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-600 hover:to-pink-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-download"></i> Get Video
            </button>
        </div>

        <!-- Loading Spinner (Hidden by default) -->
        <div id="loading" class="hidden flex-col items-center justify-center space-y-3 py-8">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-pink-500"></i>
            <p class="text-gray-400 animate-pulse">Extracting video in HD quality...</p>
        </div>

        <!-- Error Message (Hidden by default) -->
        <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg text-sm">
            <!-- Error text goes here -->
        </div>

        <!-- Result Card (Hidden by default) -->
        <div id="resultCard" class="hidden glass-card rounded-2xl p-6 shadow-2xl text-left animate-fade-in-up">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                
                <!-- Video Thumbnail Container -->
                <div class="video-container w-full md:w-48 flex-shrink-0">
                    <img id="videoThumbnail" 
                        class="w-full h-full object-contain bg-black" 
                        referrerpolicy="no-referrer" 
                        alt="TikTok Thumbnail" 
                        src="">
                </div>
                
                <!-- Video Info & Buttons -->
                <div class="flex flex-col flex-1 space-y-4 w-full">
                    <div>
                        <h3 id="authorName" class="text-xl font-bold text-white">@username</h3>
                        <p id="videoDesc" class="text-gray-400 text-sm mt-1 line-clamp-3">Video description goes here...</p>
                    </div>
                    
                    <!-- Quality Badge -->
                    <div id="qualityBadgeContainer" class="flex items-center gap-2">
                        <span class="text-gray-400 text-sm">Video Quality:</span>
                        <span id="qualityBadge" class="quality-badge quality-hd">
                            <i class="fa-solid fa-star"></i> 1080p HD
                        </span>
                    </div>
                    
                    <div class="flex flex-col space-y-3 pt-4">
                        <button id="downloadBtn" onclick="handleDownload()" 
                            class="w-full bg-pink-600 hover:bg-pink-500 text-white text-center font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            <i class="fa-solid fa-download"></i> Download No Watermark
                        </button>
                        
                        <button id="copyLinkBtn" onclick="copyToClipboard()" 
                            class="w-full bg-purple-600 hover:bg-purple-500 text-white text-center font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            <i class="fa-solid fa-copy"></i> Copy Video Link
                        </button>
                        
                        <button id="audioBtn" onclick="handleAudioDownload()" 
                            class="w-full bg-gray-700 hover:bg-gray-600 text-white text-center font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                            <i class="fa-solid fa-music"></i> Download Audio (MP3)
                        </button>
                    </div>

                    <p class="text-xs text-gray-400 text-center mt-2">
                        📱 <b>iPhone/Android:</b> Tap to save directly to your Photos.
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==================== TOAST NOTIFICATION SYSTEM ====================
        function showToast(message, type = 'info', duration = 3000) {
            const toastContainer = document.createElement('div');
            toastContainer.className = `toast ${type}`;
            toastContainer.innerHTML = `
                <div class="flex items-center gap-2">
                    ${type === 'success' ? '<i class="fa-solid fa-check-circle"></i>' : ''}
                    ${type === 'error' ? '<i class="fa-solid fa-exclamation-circle"></i>' : ''}
                    ${type === 'info' ? '<i class="fa-solid fa-info-circle"></i>' : ''}
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(toastContainer);
            
            setTimeout(() => {
                toastContainer.classList.add('hide');
                setTimeout(() => toastContainer.remove(), 300);
            }, duration);
        }

        // ==================== STORE VIDEO AND AUDIO LINKS GLOBALLY ====================
        let currentVideoLink = null;
        let currentAudioLink = null;

        // ==================== SMART MOBILE DETECTION ====================
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        };

        // ==================== SHOW/HIDE CLEAR BUTTON ====================
        document.getElementById('urlInput').addEventListener('input', function() {
            const clearBtn = document.getElementById('clearBtn');
            if (this.value.trim()) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        });

        // ==================== CLEAR INPUT FUNCTION ====================
        function clearInput() {
            document.getElementById('urlInput').value = '';
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('urlInput').focus();
        }

        // ==================== PASTE FROM CLIPBOARD FUNCTION ====================
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
                document.getElementById('clearBtn').classList.remove('hidden');
                document.getElementById('urlInput').focus();
                showToast('✅ Link pasted successfully!', 'success', 2000);
            } catch (err) {
                console.error('Failed to read clipboard:', err);
                showToast('❌ Unable to access clipboard. Please paste manually.', 'error');
            }
        }

        // ==================== COPY TO CLIPBOARD FUNCTION ====================
        function copyToClipboard() {
            if (!currentVideoLink) {
                showToast('❌ No video link available', 'error');
                return;
            }

            navigator.clipboard.writeText(currentVideoLink).then(() => {
                showToast('✅ Video link copied to clipboard!', 'success', 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('❌ Failed to copy link', 'error');
            });
        }

        // ==================== SET QUALITY BADGE ====================
        function setQualityBadge(quality) {
            const badge = document.getElementById('qualityBadge');
            badge.textContent = quality;
            
            // Remove all quality classes
            badge.classList.remove('quality-hd', 'quality-sd', 'quality-high');
            
            // Add appropriate class based on quality
            if (quality.includes('1080') || quality.includes('HD')) {
                badge.classList.add('quality-hd');
                badge.innerHTML = '<i class="fa-solid fa-star"></i> ' + quality;
            } else if (quality.includes('720') || quality.includes('SD')) {
                badge.classList.add('quality-sd');
                badge.innerHTML = '<i class="fa-solid fa-video"></i> ' + quality;
            } else {
                badge.classList.add('quality-high');
                badge.innerHTML = '<i class="fa-solid fa-film"></i> ' + quality;
            }
        }

        // ==================== HANDLE VIDEO DOWNLOAD ====================
        async function handleDownload() {
            if (!currentVideoLink) {
                showToast('❌ No video link available', 'error');
                return;
            }

            if (isMobileDevice()) {
                // Mobile: Use Web Share API to save to Photos
                try {
                    const response = await fetch(currentVideoLink);
                    const blob = await response.blob();
                    
                    // Check if Web Share API is available
                    if (navigator.share) {
                        await navigator.share({
                            title: 'TikTok Video',
                            text: 'Downloaded from TikTok Downloader',
                            files: [new File([blob], 'tiktok_video.mp4', { type: 'video/mp4' })]
                        });
                        showToast('✅ Video shared! Save to Photos from the menu.', 'success');
                    } else {
                        window.location.href = currentVideoLink;
                        showToast('📥 Download started!', 'info');
                    }
                } catch (error) {
                    console.error('Share failed:', error);
                    window.location.href = currentVideoLink;
                    showToast('📥 Download started!', 'info');
                }
            } else {
                // Desktop: Open in same tab
                window.location.href = currentVideoLink;
                showToast('📥 Download started!', 'info');
            }
        }

        // ==================== HANDLE AUDIO DOWNLOAD ====================
        function handleAudioDownload() {
            if (!currentAudioLink) {
                showToast('❌ No audio link available', 'error');
                return;
            }

            window.location.href = currentAudioLink;
            showToast('🎵 Audio download started!', 'info');
        }

        // ==================== MAIN FETCH VIDEO FUNCTION ====================
        async function fetchVideo() {
            const urlInput = document.getElementById('urlInput').value;
            const loading = document.getElementById('loading');
            const resultCard = document.getElementById('resultCard');
            const errorMessage = document.getElementById('errorMessage');

            // Reset UI
            errorMessage.classList.add('hidden');
            resultCard.classList.add('hidden');

            if (!urlInput) {
                showToast('❌ Please paste a TikTok link first!', 'error');
                return;
            }

            // Show loading
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            try {
                const apiUrl = `/api/download?url=${encodeURIComponent(urlInput)}`;
                
                const response = await fetch(apiUrl);
                const json = await response.json();

                console.log("Full API Response:", json);

                if (json.status === "success") {
                    const data = json.data;
                    
                    // Extract Description
                    const descText = data.desc || data.description || data.title || 'No description';
                    
                    // Extract Author Name
                    const authorName = data.author?.nickname || data.author?.uniqueId || data.author || 'user';
                    
                    // Extract Video Link (PRIMARY - use this for video player)
                    let videoLink = null;
                    if (data.video?.playAddr) {
                        videoLink = Array.isArray(data.video.playAddr) ? data.video.playAddr[0] : data.video.playAddr;
                    } else if (data.video) {
                        videoLink = Array.isArray(data.video) ? data.video[0] : (data.video.play || data.play || data.video);
                    } else if (data.play) {
                        videoLink = data.play;
                    }

                    // Extract Audio Link
                    let audioLink = null;
                    if (data.music?.playUrl) {
                        audioLink = Array.isArray(data.music.playUrl) ? data.music.playUrl[0] : data.music.playUrl;
                    } else if (data.music) {
                        audioLink = Array.isArray(data.music) ? data.music[0] : (data.music.play || data.music);
                    }

                   // Check for Photo Slideshow FIRST
const isPhotoSlideshow = data.images && Array.isArray(data.images) && data.images.length > 0;

// Extract Cover (for poster image)
let coverUrl = null;

if (isPhotoSlideshow) {
    // If it's a slideshow, use the first image as the thumbnail
    coverUrl = data.images[0];
} else if (data.origin_cover) {
    // Prioritize the high-quality original video cover
    coverUrl = Array.isArray(data.origin_cover) ? data.origin_cover[0] : data.origin_cover;
} else if (data.video?.origin_cover) {
    coverUrl = Array.isArray(data.video.origin_cover) ? data.video.origin_cover[0] : data.video.origin_cover;
} else if (data.video?.cover) {
    // Fallback to standard cover
    coverUrl = Array.isArray(data.video.cover) ? data.video.cover[0] : data.video.cover;
} else if (data.cover) {
    coverUrl = Array.isArray(data.cover) ? data.cover[0] : data.cover;
}

// Extract Video Quality
const videoQuality = data.videoQuality || 'Unknown Quality';


                    console.log("Extracted Video Link:", videoLink);
                    console.log("Extracted Audio Link:", audioLink);
                    console.log("Extracted Cover URL:", coverUrl);
                    console.log("Video Quality:", videoQuality);

                    // Store links globally for download handlers
                    currentVideoLink = videoLink;
                    currentAudioLink = audioLink;

                    // Set video thumbnail
                    const videoThumbnail = document.getElementById('videoThumbnail');

                    // 1. Display the thumbnail image
                    if (coverUrl) {
                        videoThumbnail.src = `/api/thumbnail?url=${encodeURIComponent(coverUrl)}`;
                    } else {
                        // Fallback image just in case TikTok doesn't provide a cover
                        videoThumbnail.src = 'https://via.placeholder.com/300x400/111827/ffffff?text=No+Preview';
                    }

                    // 2. Ensure we actually got a download link
                    if (!videoLink && !isPhotoSlideshow ) {
                        throw new Error("No video link found in response");
                    }

                    // Update UI
                    document.getElementById('authorName').innerText = `@${authorName}`;
                    document.getElementById('videoDesc').innerText = descText;
                    
                    // Update Quality Badge
                    setQualityBadge(videoQuality);
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    
                    if (isPhotoSlideshow) {
                        downloadBtn.innerHTML = '<i class="fa-solid fa-image"></i> Open Image Slideshow';
                        currentVideoLink = data.images[0];
                        document.getElementById('videoDesc').innerText = "📸 Photo Slideshow: " + descText;
                        downloadBtn.style.display = 'flex';
                        document.getElementById('audioBtn').style.display = 'none';
                        document.getElementById('copyLinkBtn').style.display = 'none';
                    } else if (videoLink) {
                        downloadBtn.innerHTML = '<i class="fa-solid fa-download"></i> Download No Watermark';
                        downloadBtn.style.display = 'flex';
                        document.getElementById('copyLinkBtn').style.display = 'flex';
                    } else {
                        downloadBtn.style.display = 'none';
                        document.getElementById('copyLinkBtn').style.display = 'none';
                    }
                    
                    const audioBtn = document.getElementById('audioBtn');
                    if (audioLink) {
                        audioBtn.style.display = 'flex';
                    } else {
                        audioBtn.style.display = 'none';
                    }

                    if (!videoLink && !audioLink && !isPhotoSlideshow) {
                        throw new Error("Could not find any download links for this video.");
                    }

                    // Final UI Update
                    loading.classList.add('hidden');
                    loading.classList.remove('flex');
                    resultCard.classList.remove('hidden');
                    showToast('✅ Video loaded successfully!', 'success', 2000);
                } else {
                    throw new Error(json.message || "Failed to fetch video.");
                }
            } catch (error) {
                console.error("Extraction Error:", error);
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                showToast(`❌ ${error.message || 'Something went wrong. Please try again.'}`, 'error');
            }
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        // Allow Enter key to fetch video
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchVideo();
            }
        });
    </script>

</body>
</html>
